# Deploy do PAI — converte index.php → index.html e publica no GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index.html from index.php
        run: |
          mkdir -p _site
          # Copia index.php renomeado como index.html
          # (o arquivo é HTML puro com extensão .php — nenhum código PHP a executar)
          cp index.php _site/index.html
          # Copia os assets (CSS, JS, imagens)
          cp -r assets _site/assets
          # Copia a pasta docs, se existir (changelog, licença etc.)
          if [ -d docs ]; then cp -r docs _site/docs; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
